<head>
    <meta charset="utf-8" />
    <title>Blogge | Personal Blog Site</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Blogge | Personal Blog Site" />
    <meta
      property="og:description"
      content="Personal blog site template for articles and updates."
    />
    <meta property="og:image" content="images/blog/blog-single.png" />
    <meta property="og:url" content="https://example.com" />

    <!-- mobile responsive meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <!-- Theme Stylesheet -->
    <link href="css/style.css" rel="stylesheet" />

    <!--Favicon-->
    <link rel="shortcut icon" href="images/favicon.svg" type="image/x-icon" />
    <link rel="icon" href="images/favicon.svg" type="image/x-icon" />

    <!-- Custom Styles for UI Enhancements -->
    <style>
      /* Category Filter Hover */
      .custom-category-nav .nav-link:hover {
        background-color: #e9ecef !important;
      }

      .custom-category-nav .nav-link.active:hover {
        background-color: #333 !important;
      }

      /* Article Card Hover */
      .blog-post-card {
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .blog-post-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12) !important;
      }

      /* Pagination Hover */
      .custom-pagination .page-link:hover {
        background-color: #f8f9fa !important;
        color: #000 !important;
      }

      .custom-pagination .page-item.active .page-link:hover {
        background-color: #222 !important;
        color: #fff !important;
      }
    </style>
  </head>
